default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("DB_POOL", ENV.fetch("RAILS_MAX_THREADS", 5)) %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USER", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "sgo_api_development") %>
  prepared_statements: false

test:
  <<: *default
  database: <%= ENV.fetch("DB_TEST_NAME", "sgo_api_test") %>

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "sgo_api_production") %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CACHE_NAME", "#{ENV.fetch("DB_NAME", "sgo_api_production")}_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch("DB_QUEUE_NAME", "#{ENV.fetch("DB_NAME", "sgo_api_production")}_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CABLE_NAME", "#{ENV.fetch("DB_NAME", "sgo_api_production")}_cable") %>
    migrations_paths: db/cable_migrate
